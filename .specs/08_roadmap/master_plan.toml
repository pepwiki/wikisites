# =============================================================================
# PHASE 0: Project Initialization
# =============================================================================

[[task]]
id = "T-001"
name = "Initialize monorepo structure"
phase = 0
prerequisites = []
outputs = ["package.json", "bun.lockb", "bunfig.toml", "pnpm-workspace.yaml"]
verification = "pnpm install succeeds"
estimated_duration = "5 minutes"
owner = "maintainer"

[[task]]
id = "T-002"
name = "Configure TypeScript with strict mode"
phase = 0
prerequisites = ["T-001"]
outputs = ["tsconfig.base.json", "tsconfig.encp.json", "tsconfig.wiki.json", "tsconfig.shared.json"]
verification = "tsc --noEmit passes for all configs"
estimated_duration = "10 minutes"
owner = "maintainer"

[[task]]
id = "T-003"
name = "Set up ESLint 9 flat config with TypeScript"
phase = 0
prerequisites = ["T-001", "T-002"]
outputs = ["eslint.config.js"]
verification = "eslint . --max-warnings=0 passes"
estimated_duration = "10 minutes"
owner = "maintainer"

[[task]]
id = "T-004"
name = "Set up Prettier and commitlint"
phase = 0
prerequisites = ["T-001"]
outputs = [".prettierrc", ".prettierignore", "commitlint.config.js"]
verification = "prettier --check . passes"
estimated_duration = "5 minutes"
owner = "maintainer"

[[task]]
id = "T-005"
name = "Configure Husky git hooks and lint-staged"
phase = 0
prerequisites = ["T-003", "T-004"]
outputs = [".husky/pre-commit", ".husky/commit-msg", "lint-staged.config.js"]
verification = "git commit with bad message is rejected"
estimated_duration = "10 minutes"
owner = "maintainer"

