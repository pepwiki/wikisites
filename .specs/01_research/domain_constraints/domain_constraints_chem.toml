[metadata]
project = "wikisites"
scope = "Chemistry algorithms and data integrity constraints"
last_updated = "2026-06-07"
applicable_sites = ["ENCP", "WIKI"]

# =============================================================================
# MOLECULAR WEIGHT PRECISION
# =============================================================================

[molecular_weight]
description = "Constraints for molecular weight calculations in Daltons (Da)"

[molecular_weight.monoisotopic]
precision_da = 0.001
tolerance_da = 0.001
unit = "Daltons (Da)"
decimal_places = 4
notes = "Monoisotopic mass uses most abundant isotope for each element. Required for mass spectrometry matching."
source = "IUPAC recommendations for peptide mass reporting."

[molecular_weight.average]
precision_da = 0.01
tolerance_da = 0.01
unit = "Daltons (Da)"
decimal_places = 2
notes = "Average mass uses weighted isotopic abundances. Used for general chemistry calculations."
source = "IUPAC atomic weight standards."

[molecular_weight.water_loss]
value_da = 18.01056
tolerance_da = 0.00001
unit = "Daltons (Da)"
notes = "Mass of water lost per peptide bond formation. Exact value for monoisotopic calculation."
source = "Atomic mass constants (IUPAC 2021)."

[molecular_weight.peptide_bond]
residue_mass_source = "UniProt/Swiss-Prot"
hydrogen_loss_da = 1.00794
hydroxyl_loss_da = 17.00274
notes = "Peptide bond formation: -H from amino group, -OH from carboxyl group = -18.01056 Da total."

# =============================================================================
# STRUCTURAL COORDINATE PRECISION
# =============================================================================

[structural_coordinates]
description = "Constraints for 3D structural coordinate data"

[structural_coordinates.atomic_positions]
precision_angstrom = 0.001
tolerance_angstrom = 0.001
unit = "Angstroms (Å)"
decimal_places = 3
notes = "X-ray crystallography standard resolution. NMR structures may have higher uncertainty."
source = "PDB file format specification."

[structural_coordinates.bond_lengths]
precision_angstrom = 0.001
tolerance_angstrom = 0.005
unit = "Angstroms (Å)"
notes = "Covalent bond length constraints for peptide backbone and side chains."
source = "Engh & Huber bond parameter corrections."

[structural_coordinates.bond_angles]
precision_degrees = 0.1
tolerance_degrees = 0.5
unit = "Degrees (°)"
notes = "Angular precision for Ramachandran plot analysis."
source = "Ramachandran plot standard definitions."

[structural_coordinates.dihedral_angles]
precision_degrees = 0.1
tolerance_degrees = 1.0
unit = "Degrees (°)"
notes = "Phi (φ), Psi (ψ), Omega (ω) angles for backbone conformation."
source = "IUPAC nomenclature for torsion angles."

[structural_coordinates.ramachandran]
allowed_regions = "≥98% of residues in allowed regions"
outlier_threshold = 2.0
notes = "Quality metric for protein/peptide structures. Outliers flagged for review."
source = "Lovell et al., 2003 (Ramachandran plot validation)."

# =============================================================================
# CHARGE CALCULATION
# =============================================================================

[charge_calculation]
description = "Constraints for net charge prediction at given pH"

[charge_calculation.pka_values]
N_terminal = 9.69
C_terminal = 2.34
Asp = 3.65
Glu = 4.25
Cys = 8.18
Tyr = 10.07
Lys = 10.53
Arg = 12.48
His = 6.00
notes = "Standard pKa values at 25°C, ionic strength 0.1 M. Actual values vary with local environment."
source = "Bjellqvist et al., 1994; EMBOSS amino acid pKa tables."

[charge_calculation.integer_exactness]
net_charge_precision = "exact integer"
notes = "At any given pH, the net charge must be calculated to integer precision. Fractional charges represent ensemble averages."
source = "Henderson-Hasselbalch equation application."

[charge_calculation.henderson_hasselbalch]
equation = "pH = pKa + log10([A-]/[HA])"
protonated_fraction = "1 / (1 + 10^(pH - pKa))"
deprotonated_fraction = "10^(pH - pKa) / (1 + 10^(pH - pKa))"
notes = "Foundation equation for ionization state calculations."
source = "Henderson, 1908; Hasselbalch, 1917."

[charge_calculation.ph_range]
min = 0.0
max = 14.0
typical_range = [2.0, 12.0]
notes = "Physiological pH range: 6.8–7.4. Experimental range: 2.0–12.0."

# =============================================================================
# ISOELECTRIC POINT CALCULATION
# =============================================================================

[isoelectric_point]
description = "Constraints for isoelectric point (pI) calculation"

[isoelectric_point.method]
algorithm = "Arnon (1971) or ExPASy Compute pI/Mw"
notes = "pI is the pH at which net charge equals zero. Computed by finding the pH between two pKa values where charge transitions through zero."

[isoelectric_point.precision]
decimal_places = 2
tolerance = 0.1
unit = "pH units"
notes = "Two decimal places sufficient for educational display. Research applications may require higher precision."

[isoelectric_point.edge_cases]
notes = "Peptides with no ionizable groups (e.g., poly-Gly) have pI near neutral. Very basic peptides may have pI > 12."

