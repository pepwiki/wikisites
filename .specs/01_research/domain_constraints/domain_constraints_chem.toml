# =============================================================================
# PEPTIDE BOND PROPERTIES
# =============================================================================

[peptide_bond]
description = "Physical and chemical properties of the peptide bond"

[peptide_bond.bond_length]
C_N_angstrom = 1.33
C_O_angstrom = 1.24
C_alpha_C_angstrom = 1.52
notes = "Partial double-bond character of C-N restricts rotation. Planar geometry."

[peptide_bond.bond_angle]
C_N_Calpha_degrees = 121.7
C_alpha_C_N_degrees = 116.6
notes = "Standard bond angles for trans peptide bond."

[peptide_bond.cis_trans]
trans_percentage = 95.0
cis_percentage = 5.0
notes = "Trans isomer overwhelmingly favored. Cis isomer more common before Proline."
source = "Stewart et al., 1990."

[peptide_bond.omega_angle]
trans_omega_degrees = 180.0
cis_omega_degrees = 0.0
notes = "Omega (ω) angle defines cis/trans isomerism about peptide bond."

# =============================================================================
# THERMODYNAMIC CONSTRAINTS
# =============================================================================

[thermodynamics]
description = "Energetic constraints for peptide bond formation and stability"

[thermodynamics.bond_formation]
free_energy_kj_mol = 8.0
notes = "Gibbs free energy of peptide bond formation in aqueous solution. Positive value indicates non-spontaneous without coupling."
source = "Fersht, 1977."

[thermodynamics.hydrogen_bond]
backbone_NH_O_kj_mol = -8.0
side_chain_kj_mol = -4.0
notes = "Hydrogen bond energies for secondary structure stabilization."
source = "Pauling & Corey, 1951."

[thermodynamics.hydrophobic_effect]
transfer_free_energy_kj_mol_per_residue = -3.5
notes = "Average free energy of transfer from water to hydrophobic environment per residue."
source = "Tanford, 1980."

[thermodynamics.secondary_structure]
alpha_helix_kj_mol_per_residue = -1.5
beta_sheet_kj_mol_per_residue = -1.2
turn_kj_mol_per_residue = -0.5
notes = "Relative stability contributions of secondary structure elements."
source = "Chou-Fasman parameters (1974)."

# =============================================================================
# DATA INTEGRITY CONSTRAINTS
# =============================================================================

[data_integrity]
description = "Constraints ensuring chemical data accuracy and consistency"

[data_integrity.sequence_validation]
allowed_characters = "ACDEFGHIKLMNPQRSTVWY"
max_sequence_length = 50
min_sequence_length = 2
notes = "Standard 20 amino acids only. Non-standard residues (selenocysteine, pyrrolysine) handled separately."

[data_integrity.formula_validation]
method = "Sum of atomic compositions from residue formulae"
atomic_precision = "integer atom counts"
notes = "Molecular formula must have integer atom counts. Floating-point errors must be resolved."

[data_integrity.consistency_checks]
molecular_weight_vs_formula = "MW must agree with formula within tolerance"
charge_vs_pI = "Charge at pI must be zero within tolerance"
sequence_vs_properties = "All residues must be valid amino acids"
notes = "Cross-validation constraints to catch calculation errors."

[data_integrity.units]
mass = "Daltons (Da)"
length = "Angstroms (Å)"
angle = "Degrees (°)"
pH = "dimensionless"
charge = "elementary charge units (e)"
energy = "kJ/mol or kcal/mol (state which)"
notes = "All values must include units. SI preferred but biochemistry conventions followed."
