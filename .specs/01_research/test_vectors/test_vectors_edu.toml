# =============================================================================
# RETENTION PROBABILITY CALCULATIONS
# Format: input = stability + elapsed_days, expected = probability of recall
# Formula: R(t,S) = (1 + t/(9*S))^(-1) where t = elapsed days, S = stability
# =============================================================================

[[test_vector]]
id = "EDU-RET-001"
category = "retention_probability"
description = "High stability, short elapsed time"
input = { stability = 30.0, elapsed_days = 5 }
expected = { retention_probability = 0.95, tolerance = 0.02 }
notes = "Well-consolidated memory, reviewed recently."
source = "FSRS forgetting curve model."

[[test_vector]]
id = "EDU-RET-002"
category = "retention_probability"
description = "High stability, moderate elapsed time"
