# =============================================================================

[[test_vector]]
id = "EDU-LAP-001"
category = "lapse_handling"
description = "First lapse on review card"
input = {
    card_state = "review",
    stability = 15.0,
    difficulty = 2.5,
    lapses = 0,
    rating = "again"
}
expected = {
    new_lapses = 1,
    next_interval_days = 1,
    state = "relearning",
    stability_after_lapse = 3.0,
    penalty_factor = 0.8
}
notes = "First lapse triggers relearning. Stability penalized."
source = "FSRS lapse handling rules."

[[test_vector]]
id = "EDU-LAP-002"
category = "lapse_handling"
description = "Second lapse — increased penalty"
input = {
    card_state = "relearning",
    stability = 3.0,
