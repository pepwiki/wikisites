notes = "Single article produces single node with no edges (relatedArticles are external)."

[[test_vector]]
id = "GRAPH-CONSTRUCT-002"
category = "graph_construction"
paper_id = "YP-CONTENT-GRAPH-VIEW-001"
description = "Edge creation from relatedArticles"
input = { articles = [{ slug = "a", title = "A", category = "chemistry", tags = ["x"], relatedArticles = ["b"] }, { slug = "b", title = "B", category = "biology", tags = ["x"], relatedArticles = [] }] }
expected = { node_count = 2, edge_count = 1, edge_type = "related" }
notes = "relatedArticles creates 'related' edge type between nodes."

[[test_vector]]
id = "GRAPH-CONSTRUCT-003"
category = "graph_construction"
paper_id = "YP-CONTENT-GRAPH-VIEW-001"
description = "Edge creation from shared tags"
input = { articles = [{ slug = "a", title = "A", category = "chemistry", tags = ["pharmacology", "receptor"], relatedArticles = [] }, { slug = "b", title = "B", category = "biology", tags = ["pharmacology", "receptor"], relatedArticles = [] }] }
expected = { node_count = 2, edge_count = 1, edge_type = "tag", edge_weight = 0.4 }
notes = "Shared tags create 'tag' edges with weight proportional to tag count."

[[test_vector]]
id = "GRAPH-CONSTRUCT-004"
category = "graph_construction"
paper_id = "YP-CONTENT-GRAPH-VIEW-001"
description = "Relevance scoring"
input = { articles = [{ slug = "a", title = "A", category = "chemistry", tags = [], relatedArticles = ["b", "c"] }, { slug = "b", title = "B", category = "biology", tags = [], relatedArticles = ["a"] }, { slug = "c", title = "C", category = "pharmacology", tags = [], relatedArticles = ["a"] }] }
expected = { node_a_relevance_gt = 0.5, node_b_relevance_lt = 0.5 }
notes = "Node 'a' has highest degree centrality (3 connections)."

[[test_vector]]
id = "GRAPH-CONSTRUCT-005"
category = "graph_construction"
paper_id = "YP-CONTENT-GRAPH-VIEW-001"
description = "Deduplication of edges"
input = { articles = [{ slug = "a", title = "A", category = "chemistry", tags = ["x"], relatedArticles = ["b"] }, { slug = "b", title = "B", category = "biology", tags = ["x"], relatedArticles = ["a"] }] }
expected = { node_count = 2, edge_count = 2, unique_edge_pairs = 2 }
notes = "Bidirectional relatedArticles produces one edge per direction, plus one tag edge."

[[test_vector]]
