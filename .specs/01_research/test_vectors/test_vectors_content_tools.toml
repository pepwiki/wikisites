category = "regex_performance"
paper_id = "YP-CONTENT-REGEX-SEARCH-001"
description = "Simple pattern on small corpus"
input = { pattern = "insulin", corpus_size = 100, avg_doc_size = 2000 }
expected = { total_time_ms_lt = 50 }
notes = "Simple literal search on 100 documents."

[[test_vector]]
id = "REGEX-PERF-002"
category = "regex_performance"
paper_id = "YP-CONTENT-REGEX-SEARCH-001"
description = "Complex pattern on medium corpus"
input = { pattern = "[ACDEFGHIKLMNPQRSTVWY]{5,10}", corpus_size = 500, avg_doc_size = 2000 }
expected = { total_time_ms_lt = 200 }
notes = "Character class quantifier on 500 documents."

[[test_vector]]
id = "REGEX-PERF-003"
category = "regex_performance"
paper_id = "YP-CONTENT-REGEX-SEARCH-001"
description = "Anchored pattern on full corpus"
input = { pattern = "^## .+$", flags = "gm", corpus_size = 500, avg_doc_size = 2000 }
expected = { total_time_ms_lt = 100 }
notes = "Anchored pattern is fast due to early termination."

[[test_vector]]
id = "REGEX-PERF-004"
category = "regex_performance"
paper_id = "YP-CONTENT-REGEX-SEARCH-001"
description = "Multiple patterns on corpus"
input = { patterns = ["insulin", "receptor", "binding"], corpus_size = 500 }
expected = { total_time_ms_lt = 150 }
notes = "Multiple sequential regex searches."
