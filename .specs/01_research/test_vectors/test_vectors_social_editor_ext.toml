precision_note = "Timing values in milliseconds. Scores 0.0-1.0. Schema versions integers."

# =============================================================================
# COMMENT THREADING
# =============================================================================

[[test_vector]]
id = "SOCIAL-COMMENT-001"
category = "comment_threading"
description = "Build thread from flat comment list"
paper_id = "YP-SOCIAL-COMMENTS-001"
input = {
    comments = [
        { id = "c1", parent_id = null, content = "Top-level comment", created_at = "2026-06-19T10:00:00Z" },
        { id = "c2", parent_id = "c1", content = "Reply to c1", created_at = "2026-06-19T10:01:00Z" },
        { id = "c3", parent_id = "c1", content = "Another reply to c1", created_at = "2026-06-19T10:02:00Z" },
        { id = "c4", parent_id = "c2", content = "Reply to c2 (nested)", created_at = "2026-06-19T10:03:00Z" },
    ]
}
expected = {
    roots = ["c1"],
    c1_children = ["c2", "c3"],
    c2_children = ["c4"],
    c3_children = [],
    c4_children = []
}
notes = "Three-level nesting with chronological ordering within each level."
source = "YP-SOCIAL-COMMENTS-001 Section 5.1"

[[test_vector]]
id = "SOCIAL-COMMENT-002"
category = "spam_detection"
description = "Score spam comment with multiple URLs"
paper_id = "YP-SOCIAL-COMMENTS-001"
input = {
    comment = { content = "Visit https://spam1.com https://spam2.com https://spam3.com https://spam4.com", created_at = "2026-06-19T10:00:00Z" },
    user = { account_age_days = 1, comment_count = 0, spam_flags = 0 },
    ip = "192.168.1.100"
}
expected = {
    spam_score_min = 0.7,
    classification = "spam",
    action = "auto_reject"
}
notes = "New account with 4 URLs triggers high spam score."
source = "YP-SOCIAL-COMMENTS-001 Section 5.2"

# =============================================================================
# ANNOTATION ANCHORING
# =============================================================================

[[test_vector]]
id = "SOCIAL-ANNOT-001"
category = "annotation_anchoring"
description = "Text position selector resolution"
paper_id = "YP-SOCIAL-ANNOTATIONS-001"
input = {
    selector = { type = "TextPositionSelector", start = 100, end = 150 },
    document_text = "The peptide bond is a covalent chemical bond linking two consecutive alpha-amino acid monomers along a peptide or protein chain."
}
expected = {
    resolved_text = "chemical bond linking two consecutive alpha-amino acid",
    start_offset = 100,
    end_offset = 150,
    resolved = true
}
notes = "Standard text position resolution."
source = "YP-SOCIAL-ANNOTATIONS-001 Section 5.1"

[[test_vector]]
id = "SOCIAL-ANNOT-002"
category = "annotation_anchoring"
description = "Quote-based fuzzy matching after content edit"
paper_id = "YP-SOCIAL-ANNOTATIONS-001"
input = {
    selector = { type = "TextQuoteSelector", exact = "peptide bond is a covalent chemical bond", prefix = "The ", suffix = " linking" },
    original_text = "The peptide bond is a covalent chemical bond linking two amino acids.",
    edited_text = "A peptide bond is a special covalent chemical bond linking two amino acids."
}
expected = {
    resolved = true,
    fuzzy_match = true,
    new_text = "peptide bond is a special covalent chemical bond",
    confidence = 0.85
}
notes = "Fuzzy matching handles inserted word ('special') in edited content."
source = "YP-SOCIAL-ANNOTATIONS-001 Section 4.2.3"

