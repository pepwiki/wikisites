# =============================================================================
# MDX COMPILATION
# =============================================================================

[[test_vector]]
id = "EDITOR-MDX-001"
category = "mdx_compilation"
description = "Frontmatter parsing with Zod validation"
paper_id = "YP-EDITOR-MDX-001"
input = {
    frontmatter = """
    title: Oxytocin
    description: A peptide hormone and neuropeptide
    classification: nonapeptide
    sequence: CYIQNCPLG
    tags: [hormone, neuropeptide, social-bonding]
    """
}
expected = {
    valid = true,
    parsed = {
        title = "Oxytocin",
        description = "A peptide hormone and neuropeptide",
        classification = "nonapeptide",
        sequence = "CYIQNCPLG",
        tags = ["hormone", "neuropeptide", "social-bonding"]
    }
}
notes = "Valid frontmatter matching content collection schema."
source = "YP-EDITOR-MDX-001 Section 4.2.1"

[[test_vector]]
id = "EDITOR-MDX-002"
category = "mdx_compilation"
description = "Invalid sequence in frontmatter"
paper_id = "YP-EDITOR-MDX-001"
input = {
    frontmatter = """
    title: Invalid Peptide
    sequence: XYZ123
    """
}
expected = {
    valid = false,
    error = "sequence must match pattern ^[ACDEFGHIKLMNPQRSTVWY]+$"
}
notes = "Non-standard amino acid characters rejected by Zod schema."
source = "YP-EDITOR-MDX-001 Section 4.2.1"

# =============================================================================
# DIFF ALGORITHM
# =============================================================================

[[test_vector]]
id = "EDITOR-DIFF-001"
category = "diff_algorithm"
description = "Myers diff on single-line change"
paper_id = "YP-EDITOR-VERSION-HISTORY-001"
input = {
    old_text = "Oxytocin is a peptide hormone.",
    new_text = "Oxytocin is a peptide hormone and neuropeptide.",
    algorithm = "myers"
}
expected = {
    hunks = 1,
    lines_added = 0,
    lines_removed = 0,
    changes = [
        { type = "equal", value = "Oxytocin is a peptide hormone" },
        { type = "insert", value = " and neuropeptide" },
        { type = "equal", value = "." }
    ]
}
notes = "Single insertion within a line."
source = "YP-EDITOR-VERSION-HISTORY-001 Section 5.1"

# =============================================================================
# PLUGIN LIFECYCLE
# =============================================================================

[[test_vector]]
id = "EXT-PLUGIN-001"
category = "plugin_lifecycle"
description = "Plugin installation sequence"
paper_id = "YP-EXT-PLUGIN-API-001"
input = {
    manifest = {
        id = "test-plugin",
        name = "Test Plugin",
        version = "1.0.0",
        permissions = ["read:articles"],
        hooks = ["onArticleLoad"]
    },
    user_permissions = ["read:articles"]
}
expected = {
    lifecycle = ["onInstall", "onActivate"],
    hooks_registered = ["onArticleLoad"],
    granted_permissions = ["read:articles"]
}
notes = "Standard plugin installation with all required permissions."
source = "YP-EXT-PLUGIN-API-001 Section 4.1"

[[test_vector]]
id = "EXT-PLUGIN-002"
category = "plugin_lifecycle"
description = "Plugin denied due to missing permission"
paper_id = "YP-EXT-PLUGIN-API-001"
input = {
    manifest = {
        id = "plugin-requires-write",
        name = "Write Plugin",
        version = "1.0.0",
        permissions = ["read:articles", "write:content"],
        hooks = ["onEditorOpen"]
    },
    user_permissions = ["read:articles"],
    user_auto_deny = ["write:content"]
}
expected = {
    installed = false,
    reason = "permission_denied",
    missing_permission = "write:content"
}
notes = "Plugin cannot install when user auto-denies required permission."
source = "YP-EXT-PLUGIN-API-001 Section 4.3"

