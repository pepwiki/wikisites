[[test_vector]]
id = "EXT-SETTINGS-002"
category = "settings_schema"
description = "Settings merge conflict resolution"
paper_id = "YP-EXT-SETTINGS-001"
input = {
    local = {
        meta = { version = "1.0.0", exportedAt = "2026-06-19T11:00:00Z", schemaVersion = 1 },
        theme = { mode = "light" },
        learning = { dailyGoal = 10 }
    },
    imported = {
        meta = { version = "1.0.0", exportedAt = "2026-06-19T12:00:00Z", schemaVersion = 1 },
        theme = { mode = "dark" },
        notifications = { email = true }
    },
    strategy = "merge"
}
expected = {
    merged = {
        meta = { version = "1.0.0", exportedAt = "2026-06-19T12:00:00Z", schemaVersion = 1 },
        theme = { mode = "dark" },
        learning = { dailyGoal = 10 },
        notifications = { email = true }
    },
    conflicts = 0,
    imported_wins_count = 1
}
notes = "Merge strategy: imported newer timestamp wins for conflicts, local preserved for non-conflicting fields."
source = "YP-EXT-SETTINGS-001 Section 4.3"
