# =============================================================================
# EXTINCTION COEFFICIENT CALCULATIONS
# Format: input = sequence, expected = molar extinction coefficient at 280 nm
# Uses Pace et al. (1995) method: Cys (disulfide), Trp, Tyr contributions
# =============================================================================

[[test_vector]]
id = "CHEM-EXT-001"
category = "extinction_coefficient"
description = "No aromatic residues"
input = { sequence = "AGSV", aromatic_count = { W = 0, Y = 0, Cystine = 0 } }
expected = { extinction_280 = 0.0, unit = "M^-1 cm^-1" }
notes = "No Trp, Tyr, or disulfide bonds. No absorbance at 280 nm."
source = "Pace et al., 1995."

[[test_vector]]
id = "CHEM-EXT-002"
category = "extinction_coefficient"
description = "Single tyrosine"
input = { sequence = "YGGFL", aromatic_count = { W = 0, Y = 1, Cystine = 0 } }
expected = { extinction_280 = 1280.0, unit = "M^-1 cm^-1", tolerance = 50 }
notes = "Tyr molar absorptivity at 280 nm."
source = "Pace et al., 1995."

[[test_vector]]
id = "CHEM-EXT-003"
category = "extinction_coefficient"
description = "Single tryptophan"
input = { sequence = "WAVGHLM", aromatic_count = { W = 1, Y = 0, Cystine = 0 } }
expected = { extinction_280 = 5500.0, unit = "M^-1 cm^-1", tolerance = 100 }
notes = "Trp molar absorptivity dominates at 280 nm."
source = "Pace et al., 1995."

[[test_vector]]
id = "CHEM-EXT-004"
category = "extinction_coefficient"
description = "Multiple aromatics (Trp + Tyr)"
input = { sequence = "WYGGFL", aromatic_count = { W = 1, Y = 1, Cystine = 0 } }
expected = { extinction_280 = 6970.0, unit = "M^-1 cm^-1", tolerance = 150 }
notes = "Sum of Trp (5500) + Tyr (1280) contributions."
source = "Pace et al., 1995."

[[test_vector]]
id = "CHEM-EXT-005"
category = "extinction_coefficient"
description = "Disulfide bond (cystine)"
input = { sequence = "CYS-YS", aromatic_count = { W = 0, Y = 1, Cystine = 1 }, disulfide_bonds = 1 }
expected = { extinction_280 = 1450.0, unit = "M^-1 cm^-1", tolerance = 100 }
notes = "Cystine contributes ~125 + Tyr 1280 = ~1405. Tolerance accounts for local environment."
source = "Pace et al., 1995."
