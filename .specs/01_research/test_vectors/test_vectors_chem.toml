# =============================================================================
# CHARGE STATE PREDICTIONS
# Format: input = sequence + pH, expected = net charge at given pH
# Charge calculation uses Henderson-Hasselbalch with pKa values:
#   N-term: 9.69, C-term: 2.34, D(Asp): 3.65, E(Glu): 4.25,
#   C(Cys): 8.18, Y(Tyr): 10.07, K(Lys): 10.53, R(Arg): 12.48, H(His): 6.00
# =============================================================================

[[test_vector]]
id = "CHEM-CHG-001"
category = "charge_state"
description = "Glycine at neutral pH"
input = { sequence = "G", pH = 7.0 }
expected = { net_charge = 0.0, charge_states = [0], major_charge_state = 0 }
notes = "Glycine isoelectric at pH ~5.97. At pH 7.0, zwitterion dominates."
source = "Standard amino acid pKa values."

[[test_vector]]
id = "CHEM-CHG-002"
category = "charge_state"
description = "Polylysine (K5) at pH 7.0"
input = { sequence = "KKKKK", pH = 7.0 }
expected = { net_charge = 5.0, charge_states = [4, 5], major_charge_state = 5 }
notes = "Five lysine residues, all protonated at pH 7.0. Strongly cationic."
source = "Computed from Lys pKa 10.53."

[[test_vector]]
id = "CHEM-CHG-003"
category = "charge_state"
description = "Polyaspartate (D5) at pH 7.0"
input = { sequence = "DDDDD", pH = 7.0 }
expected = { net_charge = -5.0, charge_states = [-4, -5], major_charge_state = -5 }
notes = "Five aspartate residues, all deprotonated at pH 7.0. Strongly anionic."
source = "Computed from Asp pKa 3.65."

[[test_vector]]
id = "CHEM-CHG-004"
category = "charge_state"
description = "Angiotensin II (DRVYIHPF) at pH 7.4"
input = { sequence = "DRVYIHPF", pH = 7.4 }
expected = { net_charge = 1.0, charge_states = [0, 1, 2], major_charge_state = 1 }
notes = "Physiological pH. Net positive charge due to Arg and His residues."
source = "Computed from individual residue pKa values."

[[test_vector]]
id = "CHEM-CHG-005"
category = "charge_state"
description = "Glutathione (GSH, ECG) at pH 7.0"
input = { sequence = "ECG", pH = 7.0 }
expected = { net_charge = -1.0, charge_states = [-1, -2], major_charge_state = -1 }
notes = "Tripeptide antioxidant. Gamma-glutamyl linkage affects pKa slightly."
source = "Computed from standard pKa values."

[[test_vector]]
id = "CHEM-CHG-006"
category = "charge_state"
description = "Insulin B-chain fragment (FVNQHLCGSHL) at pH 2.0"
input = { sequence = "FVNQHLCGSHL", pH = 2.0 }
expected = { net_charge = 3.0, charge_states = [2, 3, 4], major_charge_state = 3 }
notes = "Low pH protonates all ionizable groups. Net positive charge."
source = "Computed from standard pKa values."

[[test_vector]]
id = "CHEM-CHG-007"
category = "charge_state"
description = "Polyarginine (R5) at pH 12.0"
input = { sequence = "RRRRR", pH = 12.0 }
expected = { net_charge = 3.0, charge_states = [2, 3, 4], major_charge_state = 3 }
notes = "At very high pH, arginine guanidinium groups partially deprotonate."
source = "Computed from Arg pKa 12.48."

[[test_vector]]
id = "CHEM-CHG-008"
category = "charge_state"
description = "Histidine-rich peptide (HHHHH) at pH 6.0"
input = { sequence = "HHHHH", pH = 6.0 }
expected = { net_charge = 2.5, charge_states = [2, 3], major_charge_state = 3 }
notes = "Histidine pKa ~6.0. At pH 6.0, approximately half protonated."
source = "Computed from His pKa 6.00."

