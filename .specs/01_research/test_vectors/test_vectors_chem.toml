[metadata]
total_vectors = 42
categories = ["molecular_weight", "charge_state", "classification", "isoelectric_point", "extinction_coefficient"]
precision_note = "All molecular weights in Daltons (Da). Charge states are integers. Tolerance per domain_constraints_chem.toml."

# =============================================================================
# MOLECULAR WEIGHT CALCULATIONS
# Format: input = amino acid sequence (one-letter codes), expected = exact MW in Da
# Water loss accounted for: each peptide bond loses 18.01056 Da
# =============================================================================

[[test_vector]]
id = "CHEM-MW-001"
category = "molecular_weight"
description = "Dipeptide — Glycylglycine (Gly-Gly)"
input = { sequence = "GG", residue_count = 2, bond_count = 1 }
expected = { molecular_weight_da = 132.0535, tolerance_da = 0.001, formula = "C4H8N2O3" }
notes = "Simplest possible peptide. Two glycine residues (57.02146 Da each) minus one water (18.01056 Da)."
source = "Lehninger Principles of Biochemistry, 8th Ed."

[[test_vector]]
id = "CHEM-MW-002"
