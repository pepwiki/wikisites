[baseline]
version = "2.0.0"
date = "2026-06-19"
description = "Regression baseline metrics for wikisites. Derived from Phase 5 performance profiling and production monitoring."

# ─── Core Web Vitals ───────────────────────────────────────────────

[baseline.core_web_vitals]
lcp = { p50 = 1200, p95 = 2500, unit = "ms" }
fid = { p50 = 50, p95 = 150, unit = "ms" }
cls = { p50 = 0.05, p95 = 0.1, unit = "score" }
inp = { p50 = 100, p95 = 300, unit = "ms" }

# ─── Bundle Size ───────────────────────────────────────────────────

[baseline.bundle_size]
initial_js = { value = 85, unit = "KB", gzipped = true }
initial_css = { value = 25, unit = "KB", gzipped = true }
total = { value = 110, unit = "KB", gzipped = true }

# ─── Page Load ─────────────────────────────────────────────────────

[baseline.page_load]
ttfb = { p50 = 50, p95 = 121, unit = "ms" }
fcp = { p50 = 800, p95 = 1500, unit = "ms" }
tti = { p50 = 1200, p95 = 2500, unit = "ms" }

# ─── Build Health ──────────────────────────────────────────────────

[baseline.build]
build_time_s = { value = 240, unit = "s" }
cold_start_s = { value = 180, unit = "s" }

# ─── Quality ───────────────────────────────────────────────────────

[baseline.quality]
test_pass_rate = { value = 100.0, unit = "%" }
code_coverage_critical = { value = 95.0, unit = "%" }
code_coverage_overall = { value = 80.0, unit = "%" }
security_vulnerabilities_critical = { value = 0, unit = "count" }

