# =============================================================================
# OutlinePanel — Heading Extraction
# =============================================================================

[[outline_extraction]]
id = "OL-EXT-001"
description = "Extract h2 and h3 headings"
html = """
<div id="content">
  <h2 id="intro">Introduction</h2>
  <p>Some text</p>
  <h2 id="background">Background</h2>
  <p>More text</p>
  <h3 id="history">History</h3>
  <p>Details</p>
  <h3 id="methods">Methods</h3>
  <p>More details</p>
</div>
"""
expected_count = 4
expected_ids = ["intro", "background", "history", "methods"]
expected_levels = [2, 2, 3, 3]

[[outline_extraction]]
id = "OL-EXT-002"
description = "Skip headings without id"
html = """
<div id="content">
  <h2>No ID Here</h2>
  <h2 id="has-id">Has ID</h2>
</div>
"""
expected_count = 1
expected_ids = ["has-id"]

[[outline_extraction]]
id = "OL-EXT-003"
description = "Skip h1 and h4+"
html = """
<div id="content">
  <h1 id="h1">Title</h1>
  <h2 id="h2">Section</h2>
  <h3 id="h3">Subsection</h3>
  <h4 id="h4">Sub-subsection</h4>
</div>
"""
expected_count = 2
expected_ids = ["h2", "h3"]

[[outline_extraction]]
id = "OL-EXT-004"
description = "Empty container"
html = '<div id="content"></div>'
expected_count = 0

[[outline_extraction]]
id = "OL-EXT-005"
description = "Deep nesting preserves order"
html = """
<div id="content">
  <h2 id="a">A</h2>
  <h3 id="a1">A.1</h3>
  <h3 id="a2">A.2</h3>
  <h2 id="b">B</h2>
  <h3 id="b1">B.1</h3>
</div>
"""
expected_count = 5
expected_ids = ["a", "a1", "a2", "b", "b1"]
expected_levels = [2, 3, 3, 2, 3]

