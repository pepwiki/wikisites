# =============================================================================
# KeyboardShortcuts — Conflict Detection
# =============================================================================

[[conflict_detection]]
id = "KB-CD-001"
description = "Same key+scope is a conflict"
new = { id = "a", key = "K", modifiers = ["Ctrl"], action = "a", scope = "global", description = "A" }
existing = [{ id = "b", key = "K", modifiers = ["Ctrl"], action = "b", scope = "global", description = "B" }]
expected_conflict_count = 1

[[conflict_detection]]
id = "KB-CD-002"
description = "Different keys no conflict"
new = { id = "a", key = "K", modifiers = ["Ctrl"], action = "a", scope = "global", description = "A" }
existing = [{ id = "b", key = "J", modifiers = ["Ctrl"], action = "b", scope = "global", description = "B" }]
expected_conflict_count = 0

[[conflict_detection]]
id = "KB-CD-003"
description = "Global scope conflicts with any same key"
new = { id = "a", key = "K", modifiers = ["Ctrl"], action = "a", scope = "global", description = "A" }
existing = [{ id = "b", key = "K", modifiers = ["Ctrl"], action = "b", scope = "modal", description = "B" }]
expected_conflict_count = 1

[[conflict_detection]]
id = "KB-CD-004"
description = "Different scopes same key — no conflict if neither global"
new = { id = "a", key = "K", modifiers = [], action = "a", scope = "modal", description = "A" }
existing = [{ id = "b", key = "K", modifiers = [], action = "b", scope = "article", description = "B" }]
expected_conflict_count = 0

[[conflict_detection]]
id = "KB-CD-005"
description = "Same binding different modifiers — no conflict"
new = { id = "a", key = "K", modifiers = ["Ctrl"], action = "a", scope = "global", description = "A" }
existing = [{ id = "b", key = "K", modifiers = ["Ctrl", "Shift"], action = "b", scope = "global", description = "B" }]
expected_conflict_count = 0

[[conflict_detection]]
id = "KB-CD-006"
description = "Empty existing — no conflict"
new = { id = "a", key = "K", modifiers = ["Ctrl"], action = "a", scope = "global", description = "A" }
existing = []
expected_conflict_count = 0

