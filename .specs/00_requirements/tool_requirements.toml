# Wikisites Tool Requirements
# Version: 1.0.0
# Date: 2026-06-19
# All tools must be compatible with: Bun 1.3+, Astro 5.x, SolidJS 1.9, TypeScript 5.9

# =============================================================================
# P0: Power User Shell
# =============================================================================

[[tool]]
name = "@nanopop/kmenu"
version = "^2.0.0"
purpose = "Command palette component — keyboard-navigable, fuzzy-searchable command menu"
tier = "P0"
category = "UI"
license = "MIT"
bundle_impact = "~8KB gzipped"
notes = "SolidJS-compatible via solid-headless alternatives or vanilla JS wrapper. Evaluate cmdk (React) vs kmenu (vanilla) vs custom implementation. Consider solid-cmdk if available."

[[tool]]
name = "cmdk"
version = "^1.0.0"
purpose = "Command palette React component (may need SolidJS adapter or rewrite)"
tier = "P0"
category = "UI"
license = "MIT"
bundle_impact = "~12KB gzipped"
notes = "React-based; may need to port to SolidJS or use as reference for custom implementation. Popular in Next.js/Vercel ecosystem."

[[tool]]
name = "hotkeys-js"
version = "^3.13.0"
purpose = "Keyboard shortcut management — register, scope, and dispatch keyboard shortcuts"
tier = "P0"
category = "Utility"
license = "MIT"
bundle_impact = "~3KB gzipped"
notes = "Lightweight, well-maintained. Supports key sequences, scopes, and filtering. Alternative: tinykeys (~400B)."

[[tool]]
name = "tinykeys"
version = "^2.0.0"
purpose = "Lightweight keyboard shortcut library (~400 bytes)"
tier = "P0"
category = "Utility"
license = "MIT"
bundle_impact = "~0.4KB gzipped"
notes = "Minimal alternative to hotkeys-js. Supports key sequences (e.g., g+h). Better for bundle size budget."

[[tool]]
name = "intersection-observer"
version = "^0.12.0"
purpose = "Scroll spy for outline panel — detect which heading is in viewport"
tier = "P0"
category = "Utility"
license = "MIT"
bundle_impact = "~1KB gzipped (polyfill)"
notes = "Native IntersectionObserver is widely supported; polyfill only for very old browsers. Consider native API with fallback."

# =============================================================================
# P1: Content Tools
# =============================================================================

[[tool]]
name = "katex"
version = "^0.16.0"
purpose = "LaTeX/KaTeX math rendering — fast, self-contained math typesetting"
tier = "P1"
category = "Rendering"
license = "MIT"
bundle_impact = "~30KB gzipped (CSS + JS)"
notes = "Must bundle CSS locally (not CDN) for offline support. Consider dynamic import for pages without math. Alternative: MathJax 3 (larger, more complete)."

[[tool]]
name = "d3-force"
version = "^3.0.0"
purpose = "Force-directed graph layout for knowledge graph visualization"
tier = "P1"
category = "Visualization"
license = "ISC"
bundle_impact = "~15KB gzipped"
notes = "d3-force for layout; render with Canvas (performance) or SVG (interactivity). Alternative: force-graph library (wraps d3-force + Three.js)."

[[tool]]
name = "force-graph"
version = "^1.0.0"
purpose = "Declarative force-directed graph component (wraps d3-force)"
tier = "P1"
category = "Visualization"
license = "MIT"
bundle_impact = "~25KB gzipped"
notes = "Higher-level API than raw d3-force. Supports canvas rendering for 500+ nodes. May need SolidJS wrapper."

[[tool]]
name = "diff-match-patch"
version = "^1.0.0"
purpose = "Text diff algorithm for version history visual diff"
tier = "P3"
category = "Utility"
license = "Apache-2.0"
bundle_impact = "~8KB gzipped"
notes = "Google's diff library. Produces character-level diffs. Alternative: jsdiff (diff library) for line-level diffs."

[[tool]]
name = "diff"
version = "^5.0.0"
purpose = "Line-level text diff for version history"
tier = "P3"
category = "Utility"
license = "BSD-3-Clause"
bundle_impact = "~6KB gzipped"
notes = "Generates unified diffs, structured diffs. Better for side-by-side view than diff-match-patch."

[[tool]]
name = "codemirror"
version = "^6.0.0"
purpose = "MDX editor for web-based content authoring (code editor component)"
tier = "P3"
category = "Editor"
license = "MIT"
bundle_impact = "~40KB gzipped (core + markdown mode)"
notes = "CodeMirror 6 is modular — only bundle needed language modes. Alternative: Monaco Editor (larger, VS Code engine). Consider @codemirror/lang-markdown and @codemirror/lang-javascript for MDX."

[[tool]]
name = "@codemirror/lang-markdown"
version = "^6.0.0"
purpose = "Markdown/MDX language support for CodeMirror"
tier = "P3"
category = "Editor"
license = "MIT"
bundle_impact = "~8KB gzipped"
notes = "Bundled with CodeMirror core. Provides syntax highlighting, folding, and autocomplete for Markdown."

[[tool]]
name = "markdown-it"
version = "^14.0.0"
purpose = "Markdown parser for preview rendering in editor"
tier = "P3"
category = "Rendering"
license = "MIT"
bundle_impact = "~12KB gzipped"
notes = "Fast, pluggable Markdown parser. Used for live preview in editor. Alternative: marked (smaller, faster)."

[[tool]]
name = "sanitize-html"
version = "^2.0.0"
purpose = "HTML sanitization for user-generated content (comments, annotations)"
tier = "P2"
category = "Security"
license = "ISC"
bundle_impact = "~5KB gzipped"
notes = "Whitelist-based HTML sanitizer. Server-side enforcement required. Alternative: DOMPurify (browser-only). Must run server-side in Cloudflare Worker."

[[tool]]
name = "dompurify"
version = "^3.0.0"
purpose = "DOM-only HTML sanitizer (client-side fallback)"
tier = "P2"
category = "Security"
license = "Apache-2.0"
bundle_impact = "~3KB gzipped"
notes = "Browser-only; cannot run in Cloudflare Worker. Use as client-side defense-in-depth alongside server-side sanitize-html."

[[tool]]
name = "pagefind"
version = "^1.5.0"
purpose = "Static search index (already in use) — extend for regex and advanced filters"
tier = "P1"
category = "Search"
license = "MIT"
bundle_impact = "~50KB WASM"
notes = "Already integrated. Regex search support needs evaluation — Pagefind may not support native regex. May need custom search layer on top."

[[tool]]
name = "flexsearch"
version = "^0.7.0"
purpose = "Full-text search library (alternative to Pagefind for regex support)"
tier = "P1"
category = "Search"
license = "MIT"
bundle_impact = "~10KB gzipped"
notes = "Supports regex, faceted search, and indexable. Client-side. Consider as Pagefind alternative if regex is critical and Pagefind doesn't support it."

# =============================================================================
# P2: Social Layer
# =============================================================================

[[tool]]
name = "giscus"
version = "^2.0.0"
purpose = "GitHub Discussions-based comment system"
tier = "P2"
category = "Social"
license = "MIT"
bundle_impact = "~15KB gzipped"
notes = "Uses GitHub Discussions as backend. Pros: no custom backend, spam protection via GitHub. Cons: requires GitHub account, limited customization. Alternative: custom comments with D1 backend."

[[tool]]
name = "marked"
version = "^12.0.0"
purpose = "Markdown parser for comment rendering (lighter than markdown-it)"
tier = "P2"
category = "Rendering"
license = "MIT"
bundle_impact = "~8KB gzipped"
notes = "Fast, lightweight Markdown parser. Use for rendering user-submitted Markdown in comments and annotations."

# =============================================================================
# P3: Editor
# =============================================================================

[[tool]]
name = "@codemirror/view"
version = "^6.0.0"
purpose = "CodeMirror 6 editor view layer"
tier = "P3"
category = "Editor"
license = "MIT"
bundle_impact = "~20KB gzipped"
notes = "Core view component for CodeMirror. Required for any CodeMirror-based editor."

[[tool]]
name = "@codemirror/state"
version = "^6.0.0"
purpose = "CodeMirror 6 state management"
tier = "P3"
category = "Editor"
license = "MIT"
bundle_impact = "~5KB gzipped"
notes = "Core state component for CodeMirror 6."

[[tool]]
name = "prosemirror"
version = "^1.0.0"
purpose = "WYSIWYG editor framework (alternative to CodeMirror for non-technical users)"
tier = "P3"
category = "Editor"
license = "MIT"
bundle_impact = "~50KB gzipped"
notes = "Rich text editing. More appropriate for WYSIWYG than CodeMirror. Consider if non-technical contributor experience is priority. Larger bundle than CodeMirror."

# =============================================================================
# P4: Extensibility
# =============================================================================

[[tool]]
name = "ajv"
version = "^8.0.0"
purpose = "JSON Schema validation for plugin API configs and settings"
tier = "P4"
category = "Validation"
license = "MIT"
bundle_impact = "~12KB gzipped"
notes = "Fast JSON schema validator. Used to validate plugin configs and settings on import. Alternative: zod (already in project)."

[[tool]]
name = "zod"
version = "^3.0.0"
purpose = "Schema validation for settings (already in project)"
tier = "P4"
category = "Validation"
license = "MIT"
bundle_impact = "~14KB gzipped"
notes = "Already used in @wikisites/shared. Prefer over ajv for consistency. Can validate settings schemas and plugin configs."

