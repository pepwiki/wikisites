# =============================================================================
# CRITICALITY CLASSIFICATION
# =============================================================================

# Critical: Failure prevents site from functioning. No workaround.
#   → Astro, SolidJS, Tailwind CSS, TypeScript, Node.js, pnpm, Vitest,
#     Playwright, LHCI, Cloudflare Pages, Cloudflare Workers, Zod, Wrangler, Git, GitHub Actions
#
# High: Failure degrades significant functionality. Workaround exists.
#   → Pagefind, astro-i18next, Cloudflare R2, Cloudflare KV, Cloudflare D1,
#     Cloudflare Durable Objects, Cloudflare Web Analytics, ESLint, Prettier,
#     @typescript-eslint, @vitest/coverage-v8, @solidjs/testing-library,
#     @axe-core/playwright, Shiki, @cloudflare/workers-types, MDX
#
# Medium: Failure affects non-critical feature. User can accomplish goals without it.
#   → FlexSearch, KaTeX, sharp
#
# Low: Failure is cosmetic or organizational. No user impact.
#   → Plausible Analytics
