IF-LATEX-001 = { component = "COMP-CONTENT-001", yellow_paper = "YP-CONTENT-LATEX-001" }
IF-GRAPH-001 = { component = "COMP-CONTENT-002", yellow_paper = "YP-CONTENT-GRAPH-VIEW-001" }
IF-SPLIT-001 = { component = "COMP-CONTENT-003", yellow_paper = "YP-UI-SPLIT-VIEWS-001" }
IF-REGEX-001 = { component = "COMP-CONTENT-004", yellow_paper = "YP-CONTENT-REGEX-SEARCH-001" }

