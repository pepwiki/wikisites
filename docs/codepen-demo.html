<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peptide Molecular Weight Calculator - CodePen Demo</title>
    <meta name="description" content="Interactive peptide molecular weight calculator - Can be pasted directly into CodePen">
    <!--
    ============================================================
    PEPTIDE MOLECULAR WEIGHT CALCULATOR
    CodePen Demo - Paste directly into CodePen
    
    Created by WikiPept
    https://wikipept.com
    https://encyclopeptide.com
    https://kingstonpeptides.com
    
    Instructions:
    1. Copy this entire file
    2. Go to https://codepen.io/pen/
    3. Paste HTML into the HTML section
    4. The calculator will work immediately
    ============================================================
    -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .calculator {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 500px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #2d3748;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #718096;
            font-size: 0.9rem;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            color: #4a5568;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1.1rem;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            text-transform: uppercase;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        
        .input-group input::placeholder {
            text-transform: none;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f7fafc;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        
        .result.hidden {
            display: none;
        }
        
        .result h3 {
            color: #2d3748;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }
        
        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .result-row:last-child {
            border-bottom: none;
        }
        
        .result-label {
            color: #718096;
        }
        
        .result-value {
            color: #2d3748;
            font-weight: 600;
            font-family: 'Monaco', 'Menlo', monospace;
        }
        
        .error {
            color: #e53e3e;
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
        }
        
        .examples {
            margin-top: 20px;
            padding: 15px;
            background: #edf2f7;
            border-radius: 8px;
        }
        
        .examples h4 {
            color: #4a5568;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        
        .example-btn {
            display: inline-block;
            padding: 6px 12px;
            margin: 4px;
            background: white;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        
        .example-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }
        
        .footer a {
            color: #667eea;
            text-decoration: none;
            font-size: 0.85rem;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="header">
            <h1>Peptide MW Calculator</h1>
            <p>Calculate molecular weight from amino acid sequence</p>
        </div>
        
        <div class="input-group">
            <label for="sequence">Peptide Sequence</label>
            <input 
                type="text" 
                id="sequence" 
                placeholder="Enter sequence (e.g., ACDEFGHIKLMNPQRSTVWY)"
                maxlength="100"
            >
        </div>
        
        <button class="btn" onclick="calculateMW()">Calculate Molecular Weight</button>
        
        <div id="error" class="error"></div>
        
        <div id="result" class="result hidden">
            <h3>Results</h3>
            <div class="result-row">
                <span class="result-label">Sequence:</span>
                <span id="resultSequence" class="result-value">-</span>
            </div>
            <div class="result-row">
                <span class="result-label">Length:</span>
                <span id="resultLength" class="result-value">-</span>
            </div>
            <div class="result-row">
                <span class="result-label">Monoisotopic MW:</span>
                <span id="resultMono" class="result-value">-</span>
            </div>
            <div class="result-row">
                <span class="result-label">Average MW:</span>
                <span id="resultAvg" class="result-value">-</span>
            </div>
            <div class="result-row">
                <span class="result-label">Molecular Formula:</span>
                <span id="resultFormula" class="result-value">-</span>
            </div>
        </div>
        
        <div class="examples">
            <h4>Try these examples:</h4>
            <button class="example-btn" onclick="setExample('OXYTOCIN')">Oxytocin</button>
            <button class="example-btn" onclick="setExample('GLUTATHIONE')">Glutathione</button>
            <button class="example-btn" onclick="setExample('INSULIN')">Insulin A-chain</button>
            <button class="example-btn" onclick="setExample('ACDEFGHIKLMNPQRSTVWY')">20 AA Mix</button>
            <button class="example-btn" onclick="setExample('AAAAAAAAAA')">Poly-Ala</button>
        </div>
        
        <div class="footer">
            <p>Based on <a href="https://wikipept.com" target="_blank">WikiPept</a> data</p>
        </div>
    </div>

    <script>
        // Amino acid monoisotopic masses
        const aminoAcidMasses = {
            'G': { mono: 57.02146, avg: 57.02146, formula: { C: 2, H: 3, N: 1, O: 1, S: 0 } },
            'A': { mono: 71.03711, avg: 71.0788, formula: { C: 3, H: 5, N: 1, O: 1, S: 0 } },
            'V': { mono: 99.06841, avg: 99.1326, formula: { C: 5, H: 9, N: 1, O: 1, S: 0 } },
            'L': { mono: 113.08406, avg: 113.1576, formula: { C: 6, H: 11, N: 1, O: 1, S: 0 } },
            'I': { mono: 113.08406, avg: 113.1576, formula: { C: 6, H: 11, N: 1, O: 1, S: 0 } },
            'P': { mono: 97.05276, avg: 97.1152, formula: { C: 5, H: 7, N: 1, O: 1, S: 0 } },
            'F': { mono: 147.06841, avg: 147.1739, formula: { C: 9, H: 9, N: 1, O: 1, S: 0 } },
            'W': { mono: 186.07931, avg: 186.2132, formula: { C: 11, H: 10, N: 2, O: 1, S: 0 } },
            'M': { mono: 131.04049, avg: 131.1961, formula: { C: 5, H: 9, N: 1, O: 1, S: 1 } },
            'S': { mono: 87.03203, avg: 87.0773, formula: { C: 3, H: 5, N: 1, O: 2, S: 0 } },
            'T': { mono: 101.04768, avg: 101.1039, formula: { C: 4, H: 7, N: 1, O: 2, S: 0 } },
            'C': { mono: 103.00919, avg: 103.1388, formula: { C: 3, H: 5, N: 1, O: 1, S: 1 } },
            'Y': { mono: 163.06333, avg: 163.1732, formula: { C: 9, H: 9, N: 1, O: 2, S: 0 } },
            'H': { mono: 137.05891, avg: 137.1393, formula: { C: 6, H: 7, N: 3, O: 1, S: 0 } },
            'D': { mono: 115.02694, avg: 115.0886, formula: { C: 4, H: 5, N: 1, O: 3, S: 0 } },
            'E': { mono: 129.04259, avg: 129.1155, formula: { C: 5, H: 7, N: 1, O: 3, S: 0 } },
            'N': { mono: 114.04293, avg: 114.1026, formula: { C: 4, H: 6, N: 2, O: 2, S: 0 } },
            'Q': { mono: 128.05858, avg: 128.1292, formula: { C: 5, H: 8, N: 2, O: 2, S: 0 } },
            'K': { mono: 128.09496, avg: 128.1724, formula: { C: 6, H: 12, N: 2, O: 1, S: 0 } },
            'R': { mono: 156.10111, avg: 156.1857, formula: { C: 6, H: 12, N: 4, O: 1, S: 0 } }
        };

        function calculateMW() {
            const sequence = document.getElementById('sequence').value.toUpperCase().trim();
            const errorEl = document.getElementById('error');
            const resultEl = document.getElementById('result');
            
            // Clear previous results
            errorEl.textContent = '';
            resultEl.classList.add('hidden');
            
            // Validate sequence
            if (!sequence) {
                errorEl.textContent = 'Please enter a peptide sequence';
                return;
            }
            
            // Check for invalid characters
            const validChars = /^[ACDEFGHIKLMNPQRSTVWY]+$/;
            if (!validChars.test(sequence)) {
                errorEl.textContent = 'Invalid characters. Use only: A C D E F G H I K L M N P Q R S T V W Y';
                return;
            }
            
            // Calculate molecular weight
            let monoMW = 0;
            let avgMW = 0;
            let formula = { C: 0, H: 0, N: 0, O: 0, S: 0 };
            
            for (const aa of sequence) {
                const data = aminoAcidMasses[aa];
                monoMW += data.mono;
                avgMW += data.avg;
                formula.C += data.formula.C;
                formula.H += data.formula.H;
                formula.N += data.formula.N;
                formula.O += data.formula.O;
                formula.S += data.formula.S;
            }
            
            // Add water (H2O) for terminal groups
            monoMW += 18.01056;
            avgMW += 18.01528;
            formula.H += 2;
            formula.O += 1;
            
            // Display results
            document.getElementById('resultSequence').textContent = sequence;
            document.getElementById('resultLength').textContent = sequence.length + ' amino acids';
            document.getElementById('resultMono').textContent = monoMW.toFixed(4) + ' Da';
            document.getElementById('resultAvg').textContent = avgMW.toFixed(4) + ' Da';
            document.getElementById('resultFormula').textContent = 
                `C${formula.C}H${formula.H}N${formula.N}O${formula.O}S${formula.S}`;
            
            resultEl.classList.remove('hidden');
        }

        function setExample(sequence) {
            document.getElementById('sequence').value = sequence;
            calculateMW();
        }

        // Allow Enter key to calculate
        document.getElementById('sequence').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calculateMW();
            }
        });
    </script>
</body>
</html>
