name = "wikisites-api"
main = "packages/workers/src/index.ts"
compatibility_date = "2026-06-07"
compatibility_flags = ["nodejs_compat"]

# Secrets (set via `wrangler secret put <NAME>`)
# JWT_SECRET - HMAC-SHA256 secret for JWT signing (generate: openssl rand -hex 32)

# KV namespace for session cache
# Provision: wrangler kv namespace create CACHE
# Then uncomment and fill in the id:
# [kv_namespaces]
# binding = "CACHE"
# id = "<FILL_IN_AFTER_PROVISION>"

# D1 database for user data, annotations, comments, progress
# Provision: wrangler d1 create wikisites-db
# Then uncomment and fill in the database_id:
# [d1_databases]
# binding = "DB"
# database_name = "wikisites-db"
# database_id = "<FILL_IN_AFTER_PROVISION>"
# migrations_dir = "packages/workers/src/db/migrations"

# Push notification subscriptions KV
# Provision: wrangler kv namespace create PUSH_SUBSCRIPTIONS
# Then uncomment:
# [[kv_namespaces]]
# binding = "PUSH_SUBSCRIPTIONS"
# id = "<FILL_IN_AFTER_PROVISION>"

[[routes]]
pattern = "encyclopeptide.com/api/*"
zone_name = "encyclopeptide.com"

[[routes]]
pattern = "wikipept.com/api/*"
zone_name = "wikipept.com"
