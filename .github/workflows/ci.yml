name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Type check
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build Encyclopeptide
        run: bun run build:encp

      - name: Build Wikipept
        run: bun run build:wiki

      - name: Search index (Encyclopeptide)
        run: bunx pagefind --site packages/encp/dist --output-path packages/encp/dist/_pagefind

      - name: Search index (Wikipept)
        run: bunx pagefind --site packages/wiki/dist --output-path packages/wiki/dist/_pagefind

      - name: Deploy Encyclopeptide
        if: github.ref == 'refs/heads/main'
        run: bunx wrangler pages deploy packages/encp/dist --project-name=wikisites-encp --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Wikipept
        if: github.ref == 'refs/heads/main'
        run: bunx wrangler pages deploy packages/wiki/dist --project-name=wikisites-wiki --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
