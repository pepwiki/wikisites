name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.2.0"
  NODE_VERSION: "20"

jobs:
  lint-and-test:
    name: Lint, Typecheck, and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: bun-deps-${{ hashFiles('bun.lock') }}
          restore-keys: bun-deps-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Type check
        run: bun run typecheck

      - name: Test
        run: bun run test

  build:
    name: Build Sites
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: bun-deps-${{ hashFiles('bun.lock') }}
          restore-keys: bun-deps-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Encyclopeptide
        run: bun run build:encp

      - name: Build Wikipept
        run: bun run build:wiki

      - name: Search index (Encyclopeptide)
        run: bunx pagefind --site packages/encp/dist --output-path packages/encp/dist/_pagefind

      - name: Search index (Wikipept)
        run: bunx pagefind --site packages/wiki/dist --output-path packages/wiki/dist/_pagefind

      - name: Upload encp artifacts
        uses: actions/upload-artifact@v4
        with:
          name: encp-dist
          path: packages/encp/dist
          retention-days: 1

      - name: Upload wiki artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wiki-dist
          path: packages/wiki/dist
          retention-days: 1

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: bun-deps-${{ hashFiles('bun.lock') }}
          restore-keys: bun-deps-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Download wiki artifacts
        uses: actions/download-artifact@v4
        with:
          name: wiki-dist
          path: packages/wiki/dist

      - name: Download encp artifacts
        uses: actions/download-artifact@v4
        with:
          name: encp-dist
          path: packages/encp/dist

      - name: Run wiki dark mode tests
        run: bunx playwright test tests/e2e/dark-mode.spec.ts --reporter=list
        env:
          CI: true

      - name: Run benchmark tests (live sites)
        run: bunx playwright test tests/e2e/benchmark.spec.ts --project=chromium --reporter=list
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Download encp artifacts
        uses: actions/download-artifact@v4
        with:
          name: encp-dist
          path: packages/encp/dist

      - name: Download wiki artifacts
        uses: actions/download-artifact@v4
        with:
          name: wiki-dist
          path: packages/wiki/dist

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Lighthouse CI (Wikipept)
        run: lhci autorun --config=./packages/wiki/lighthouserc.json

  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [build, lighthouse, e2e]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Download encp artifacts
        uses: actions/download-artifact@v4
        with:
          name: encp-dist
          path: packages/encp/dist

      - name: Download wiki artifacts
        uses: actions/download-artifact@v4
        with:
          name: wiki-dist
          path: packages/wiki/dist

      - name: Deploy Encyclopeptide
        run: bunx wrangler pages deploy packages/encp/dist --project-name=wikisites-encp --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Wikipept
        run: bunx wrangler pages deploy packages/wiki/dist --project-name=wikisites-wiki --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
