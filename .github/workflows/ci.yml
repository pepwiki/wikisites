name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.11"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run format:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run test

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bunx audit-ci --moderate

  build-encp:
    name: Build Encyclopeptide
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, security]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run build:encp
      - uses: actions/upload-artifact@v4
        with:
          name: dist-encp
          path: packages/encp/dist/

  build-wiki:
    name: Build Wikipept
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, security]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run build:wiki
      - uses: actions/upload-artifact@v4
        with:
          name: dist-wiki
          path: packages/wiki/dist/

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [build-encp, build-wiki]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: dist-encp
          path: packages/encp/dist/
      - uses: actions/download-artifact@v4
        with:
          name: dist-wiki
          path: packages/wiki/dist/
      - name: Serve and test Encyclopeptide
        run: |
          npx serve packages/encp/dist -l 3001 &
          sleep 3
          npx lhci autorun --collect.url=http://localhost:3001 \
            --assert.assertions.performance=90 \
            --assert.assertions.accessibility=95 \
            --assert.assertions.best-practices=90 \
            --assert.assertions.seo=90
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
      - name: Serve and test Wikipept
        run: |
          npx serve packages/wiki/dist -l 3002 &
          sleep 3
          npx lhci autorun --collect.url=http://localhost:3002 \
            --assert.assertions.performance=90 \
            --assert.assertions.accessibility=95 \
            --assert.assertions.best-practices=90 \
            --assert.assertions.seo=90
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [build-encp, build-wiki, lighthouse]
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Deploy encyclopeptide.com to Cloudflare Pages
        run: bunx wrangler pages deploy packages/encp/dist --project-name=wikisites-encp
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy wikipept.com to Cloudflare Pages
        run: bunx wrangler pages deploy packages/wiki/dist --project-name=wikisites-wiki
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
